  height: 200px;
  object-fit: cover;
}

.product-card h3 {
  font-size: 18px;
  font-weight: 600;
  margin: 16px 16px 8px;
}

.location {
  font-size: 13px;
  color: #6b7280;
  margin: 0 16px 12px;
}

.price-row {
  display: flex;
  justify-content: space-between;
  margin: 0 16px 16px;
}

.price {
  color: #dc2626;
  font-weight: 600;
}

.moq {
  color: #dc2626;
  font-weight: 600;
}

.card-buttons {
  display: flex;
  gap: 8px;
  padding: 0 16px 16px;
}

.btn-primary {
  flex: 1;
  background: #10b981;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 6px;
  font-weight: 600;
  cursor: pointer;
}

.btn-secondary {
  padding: 10px 16px;
  background: #fff;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  cursor: pointer;
}

/* Mobile responsive */
@media (max-width: 768px) {
  .hero {
    flex-direction: column;
    padding: 40px 24px;
  }
  
  .hero-text h1 {
    font-size: 32px;
  }
  
  .product-grid {
    grid-template-columns: 1fr;
  }
}
